{% extends "charles/base.html" %}

{% block title %}Sign Out — Charles Auth{% endblock %}

{% block body %}
<div style="text-align: center; padding: 20px 0;">
    <h2 style="color: #333; margin-bottom: 15px;">Sign Out?</h2>
    <p style="color: #666; margin-bottom: 30px;">
        Are you sure you want to sign out? You can sign back in anytime.
    </p>

    <form method="post">
        {% csrf_token %}
        <button type="submit" style="margin-bottom: 15px;">Yes, Sign Me Out</button>
    </form>

    <a href="{% url 'charles:dashboard' %}" style="display: inline-block; padding: 12px 20px; background: #f0f0f0; border-radius: 4px; text-decoration: none; color: #333; font-weight: 500;">
        Never Mind
    </a>
</div>
{% endblock %}
