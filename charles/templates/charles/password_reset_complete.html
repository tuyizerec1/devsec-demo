{% extends "charles/base.html" %}

{% block title %}Password Reset Complete — Charles Auth{% endblock %}

{% block body %}
<div style="max-width: 500px; margin: 50px auto; padding: 20px;">
  <h2 style="text-align: center; color: #333; margin-bottom: 20px;">Password updated</h2>
  <p style="text-align: center; color: #666; font-size: 0.9rem; line-height: 1.7; margin-bottom: 30px;">
    Your password has been successfully reset. You can now sign in with your new credentials.
  </p>
  <div style="text-align: center;">
    <a href="{% url 'charles:login' %}" style="display: inline-block; padding: 12px 30px; background: #4f46e5; color: white; text-decoration: none; border-radius: 4px; font-weight: 600;">Sign in</a>
  </div>
</div>
{% endblock %}
